<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JC² Cards — Personal Collection</title>
<style>
  :root {
    --navy:  #002244;
    --red:   #CC0000;
    --gold:  #c9a84c;
    --bg:    #080f1e;
    --card-bg: #111b2e;
    --card-border: #1e2f4a;
    --text:  #f0f4ff;
    --sub:   #8fa0be;
    --chip-bg: #1a2840;
    --chip-active: #CC0000;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

  /* ── HEADER ── */
  header { background: linear-gradient(135deg, #001830 0%, #002244 60%, #1a0000 100%); padding: 10px 16px; border-bottom: 2px solid var(--red); position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; align-items: center; gap: 12px; }
  .header-brand { flex-shrink: 0; }
  .logo { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.5px; }
  .logo span { color: var(--red); }
  .collection-label { font-size: 0.7rem; color: var(--sub); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 1px; }
  .not-for-sale { font-size: 0.65rem; background: var(--red); color: #fff; padding: 2px 7px; border-radius: 3px; font-weight: 700; letter-spacing: 0.5px; flex-shrink: 0; }

  /* Player tabs — inline with header */
  .player-tabs { display: flex; gap: 0; overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; flex: 1; }
  .player-tabs::-webkit-scrollbar { display: none; }
  .tab { padding: 6px 14px; font-size: 0.78rem; font-weight: 600; color: var(--sub); border-bottom: 3px solid transparent; cursor: pointer; white-space: nowrap; transition: all 0.2s; flex-shrink: 0; }
  .tab.active { color: #fff; border-bottom-color: var(--red); }
  .tab.coming-soon { opacity: 0.4; cursor: default; }

  /* ── STATS BAR ── */
  .stats-bar { background: var(--navy); padding: 10px 16px; display: flex; gap: 20px; border-bottom: 1px solid var(--card-border); }
  .stat { text-align: center; }
  .stat-val { font-size: 1.1rem; font-weight: 800; color: var(--gold); }
  .stat-lbl { font-size: 0.65rem; color: var(--sub); text-transform: uppercase; letter-spacing: 0.8px; }

  /* ── FILTER BAR ── */
  .filter-bar { background: #0d1625; padding: 10px 12px; border-bottom: 1px solid var(--card-border); position: sticky; top: 56px; z-index: 99; }
  .search-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .search-input { flex: 1; background: var(--card-bg); border: 1px solid var(--card-border); color: var(--text); border-radius: 8px; padding: 8px 12px; font-size: 0.85rem; outline: none; }
  .search-input::placeholder { color: var(--sub); }
  .search-input:focus { border-color: var(--red); }
  .sort-select { background: var(--card-bg); border: 1px solid var(--card-border); color: var(--text); border-radius: 8px; padding: 8px 10px; font-size: 0.8rem; outline: none; cursor: pointer; }
  .chips { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
  .chips::-webkit-scrollbar { display: none; }
  .chip { flex-shrink: 0; padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; background: var(--chip-bg); color: var(--sub); border: 1px solid var(--card-border); cursor: pointer; transition: all 0.15s; }
  .chip.active { background: var(--chip-active); color: #fff; border-color: var(--chip-active); }

  /* ── CARD GRID ── */
  .grid-wrap { padding: 12px; }
  .count-row { font-size: 0.75rem; color: var(--sub); margin-bottom: 10px; }
  .card-grid { display: grid; gap: 8px; }

  /* Small — image-only grid, most cards per row */
  .card-grid.size-s { grid-template-columns: repeat(3, 1fr); gap: 7px; }
  .card-grid.size-s .card-info { display: none; }
  @media (min-width: 480px) { .card-grid.size-s { grid-template-columns: repeat(4, 1fr); } }
  @media (min-width: 700px) { .card-grid.size-s { grid-template-columns: repeat(5, 1fr); gap: 8px; } }
  @media (min-width: 1000px) { .card-grid.size-s { grid-template-columns: repeat(6, 1fr); } }

  /* Medium — labels visible */
  .card-grid.size-m { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  @media (min-width: 480px) { .card-grid.size-m { grid-template-columns: repeat(3, 1fr); } }
  @media (min-width: 700px) { .card-grid.size-m { grid-template-columns: repeat(4, 1fr); gap: 12px; } }
  @media (min-width: 1000px) { .card-grid.size-m { grid-template-columns: repeat(5, 1fr); } }

  /* Large — big cards, fewest per row */
  .card-grid.size-l { grid-template-columns: repeat(1, 1fr); gap: 12px; }
  @media (min-width: 480px) { .card-grid.size-l { grid-template-columns: repeat(2, 1fr); } }
  @media (min-width: 700px) { .card-grid.size-l { grid-template-columns: repeat(3, 1fr); gap: 14px; } }
  @media (min-width: 1000px) { .card-grid.size-l { grid-template-columns: repeat(4, 1fr); } }

  /* Size toggle buttons */
  .size-btns { display: flex; gap: 0; flex-shrink: 0; }
  .size-btn { padding: 7px 11px; font-size: 0.75rem; font-weight: 700; background: var(--chip-bg); border: 1px solid var(--card-border); color: var(--sub); cursor: pointer; line-height: 1; transition: background 0.15s, color 0.15s; }
  .size-btn:first-child { border-radius: 8px 0 0 8px; }
  .size-btn:last-child  { border-radius: 0 8px 8px 0; }
  .size-btn.active { background: var(--navy); color: #fff; border-color: var(--navy); }

  .card-tile { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 10px; overflow: hidden; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; }
  .card-tile:active { transform: scale(0.97); }
  @media (hover: hover) { .card-tile:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(204,0,0,0.15); border-color: var(--red); } }
  .card-tile.hidden { display: none; }

  .thumb-wrap { position: relative; aspect-ratio: 3/4; overflow: hidden; background: #0a1020; }
  .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .badges { position: absolute; top: 5px; left: 5px; display: flex; flex-direction: column; gap: 3px; }
  .badge { font-size: 0.6rem; font-weight: 800; padding: 2px 5px; border-radius: 3px; letter-spacing: 0.3px; }
  .badge.psa    { background: #CC0000; color: #fff; }
  .badge.relic  { background: #8B4513; color: #fff; }
  .badge.numbered { background: #003087; color: #fff; }
  .badge.insert { background: #1a4a1a; color: #7fff7f; }
  .badge.auto   { background: #4a1a4a; color: #ff9fff; }
  .val-badge { position: absolute; bottom: 5px; right: 5px; background: rgba(0,0,0,0.8); border: 1px solid var(--gold); color: var(--gold); font-size: 0.65rem; font-weight: 800; padding: 2px 6px; border-radius: 4px; }

  .card-info { padding: 7px 8px 9px; }
  .card-set { font-size: 0.7rem; color: var(--sub); line-height: 1.2; margin-bottom: 2px; }
  .card-name { font-size: 0.8rem; font-weight: 700; color: var(--text); line-height: 1.2; }

  /* ── MODAL ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 999; align-items: flex-end; }
  .modal-overlay.open { display: flex; }
  @media (min-width: 600px) { .modal-overlay { align-items: center; justify-content: center; } }
  .modal { background: var(--card-bg); border-top: 3px solid var(--red); border-radius: 16px 16px 0 0; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; animation: slideUp 0.25s ease; }
  @media (min-width: 600px) { .modal { border-radius: 16px; border-top: 3px solid var(--red); } }
  @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px 0; }
  .modal-close { width: 32px; height: 32px; border-radius: 50%; background: var(--chip-bg); border: none; color: var(--text); font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .modal-img { padding: 12px 16px; }
  .modal-img img { width: 100%; border-radius: 10px; max-height: 320px; object-fit: contain; background: #0a1020; }
  .modal-details { padding: 0 16px 20px; }
  .modal-player { font-size: 1.3rem; font-weight: 900; letter-spacing: -0.3px; }
  .modal-set { font-size: 0.85rem; color: var(--sub); margin-bottom: 12px; margin-top: 2px; }
  .modal-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--card-border); font-size: 0.82rem; }
  .modal-row:last-child { border-bottom: none; }
  .modal-label { color: var(--sub); }
  .modal-value { font-weight: 600; color: var(--text); text-align: right; }
  .modal-value.highlight { color: var(--gold); }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--sub); }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="header-brand">
      <div class="logo">JC<span>²</span> Cards</div>
      <div class="collection-label">Personal Collection</div>
    </div>
    <div class="player-tabs">
      <div class="tab active" onclick="switchPlayer('dart')">Jaxson Dart</div>
      <div class="tab" onclick="switchPlayer('skattebo')">Cam Skattebo</div>
      <div class="tab" onclick="switchPlayer('nabers')">Malik Nabers</div>
      <div class="tab" onclick="switchPlayer('carter')">Abdul Carter</div>
    </div>
    <div class="not-for-sale">NOT FOR SALE</div>
  </div>
</header>

<div class="stats-bar" id="statsBar">
  <div class="stat"><div class="stat-val" id="statTotal">—</div><div class="stat-lbl">Cards</div></div>
  <div class="stat"><div class="stat-val" id="statValue">—</div><div class="stat-lbl">Est. Value</div></div>
  <div class="stat"><div class="stat-val" id="statGraded">—</div><div class="stat-lbl">PSA Graded</div></div>
  <div class="stat"><div class="stat-val" id="statRelics">—</div><div class="stat-lbl">Relics</div></div>
</div>

<div class="filter-bar">
  <div class="search-row">
    <input class="search-input" id="searchInput" placeholder="Search by set, parallel, type..." oninput="applyFilters()">
    <select class="sort-select" id="sortSelect" onchange="applyFilters()">
      <option value="dupes" selected>Value + Set</option>
      <option value="value-desc">Value ↓</option>
      <option value="value-asc">Value ↑</option>
      <option value="set-az">Set A–Z</option>
      <option value="id-asc">Original Order</option>
    </select>
    <div class="size-btns">
      <button class="size-btn" data-size="s" onclick="setSize('s')">S</button>
      <button class="size-btn" data-size="m" onclick="setSize('m')">M</button>
      <button class="size-btn" data-size="l" onclick="setSize('l')">L</button>
    </div>
  </div>
  <div class="chips" id="chipRow">
    <div class="chip active" data-filter="all" onclick="setChip(this)">All</div>
    <div class="chip" data-filter="psa" onclick="setChip(this)">PSA Graded</div>
    <div class="chip" data-filter="relic" onclick="setChip(this)">Relic</div>
    <div class="chip" data-filter="numbered" onclick="setChip(this)">Numbered</div>
    <div class="chip" data-filter="insert" onclick="setChip(this)">Insert</div>
    <div class="chip" data-filter="prizm" onclick="setChip(this)">Prizm</div>
    <div class="chip" data-filter="select" onclick="setChip(this)">Select</div>
    <div class="chip" data-filter="optic" onclick="setChip(this)">Optic</div>
    <div class="chip" data-filter="topps" onclick="setChip(this)">Topps</div>
    <div class="chip" data-filter="base" onclick="setChip(this)">Base</div>
  </div>
</div>

<div class="grid-wrap">
  <div class="count-row" id="countRow"></div>
  <div class="card-grid" id="cardGrid"></div>
  <div class="empty-state hidden" id="emptyState">
    <div class="icon">🔍</div>
    <div>No cards match that filter.</div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div style="font-size:0.7rem;color:var(--sub);text-transform:uppercase;letter-spacing:1px;">Card Detail</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-img"><img id="modalImg" src="" alt=""></div>
    <div class="modal-details">
      <div class="modal-player" id="modalPlayer"></div>
      <div class="modal-set" id="modalSet"></div>
      <div id="modalRows"></div>
    </div>
  </div>
</div>

function cardImage(id) {
  const p = PLAYER_DATA[CURRENT_PLAYER];
  return `images/${p.dir}/${p.prefix}_${String(id).padStart(3,'0')}.jpg`;
}

function badgeHTML(card) {
  let out = '';
  if (card.grade) out += `<div class="badge psa">${card.grade}</div>`;
  if (card.type === 'relic') out += `<div class="badge relic">RELIC</div>`;
  if (card.serial) out += `<div class="badge numbered">${card.serial}</div>`;
  if (card.type === 'insert' && !card.grade) out += `<div class="badge insert">INSERT</div>`;
  return out;
}

    empty.classList.remove('hidden');
    countRow.textContent = '';
    return;
  }
  empty.classList.add('hidden');
  countRow.textContent = `${cards.length} card${cards.length !== 1 ? 's' : ''} shown`;
  cards.forEach(c => {
    const tile = document.createElement('div');
    tile.className = 'card-tile';
    tile.innerHTML = `
      <div class="thumb-wrap">
        <img src="${cardImage(c.id)}" alt="${c.subset}" loading="lazy">
        <div class="badges">${badgeHTML(c)}</div>
        <div class="val-badge">$${c.value}</div>
      </div>
      <div class="card-info">
        <div class="card-set">${c.set}</div>
        <div class="card-name">${c.subset || c.parallel}</div>
      </div>`;
    tile.onclick = () => openModal(c);
    grid.appendChild(tile);
  });
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.getElementById('sortSelect').value;
  const CARDS = getCards();
  let filtered = CARDS.filter(c => {
    if (activeFilter !== 'all' && !c.tags.includes(activeFilter)) return false;
    if (q && !`${c.set} ${c.subset} ${c.parallel} ${c.grade||''} ${c.serial||''}`.toLowerCase().includes(q)) return false;
    return true;
  });
  if (sort === 'dupes') filtered.sort((a,b) =>
    b.value - a.value ||
    a.set.localeCompare(b.set) ||
    (a.subset||'').localeCompare(b.subset||'') ||
    (a.parallel||'').localeCompare(b.parallel||'')
  );
  else if (sort === 'value-desc') filtered.sort((a,b) => b.value - a.value);
  else if (sort === 'value-asc') filtered.sort((a,b) => a.value - b.value);
  else if (sort === 'set-az') filtered.sort((a,b) => a.set.localeCompare(b.set));
  else filtered.sort((a,b) => a.id - b.id);
  renderGrid(filtered);
}

function setChip(el) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  activeFilter = el.dataset.filter;
  applyFilters();
}

function updateStats() {
  const CARDS = getCards();
  const total = CARDS.length;
  const val = CARDS.reduce((s,c) => s+c.value, 0);
  const graded = CARDS.filter(c => c.grade).length;
  const relics = CARDS.filter(c => c.type === 'relic').length;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statValue').textContent = '$'+val;
  document.getElementById('statGraded').textContent = graded;
  document.getElementById('statRelics').textContent = relics;
}

function openModal(c) {
  document.getElementById('modalImg').src = cardImage(c.id);
  document.getElementById('modalPlayer').textContent = 'Jaxson Dart';
  document.getElementById('modalSet').textContent = c.set + (c.number ? ' · ' + c.number : '');
  const rows = [
    ['Subset', c.subset || '—'],
    ['Parallel', c.parallel || '—'],
    ['Type', c.type.charAt(0).toUpperCase() + c.type.slice(1)],
    ['Serial', c.serial || 'None'],
    ['Grade', c.grade || 'Ungraded'],
    ['Est. Value', '$' + c.value],
  ];
  document.getElementById('modalRows').innerHTML = rows.map(([l,v]) =>
    `<div class="modal-row"><span class="modal-label">${l}</span><span class="modal-value${l==='Est. Value'?' highlight':''}">${v}</span></div>`
  ).join('');
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay') && e.target.className !== 'modal-close') return;
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function switchPlayer(p) {
  if (!PLAYER_DATA[p]) return;
  CURRENT_PLAYER = p;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => {
    if (t.getAttribute('onclick') === `switchPlayer('${p}')`) t.classList.add('active');
  });
  activeFilter = 'all';
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  document.querySelector('.chip[data-filter="all"]').classList.add('active');
  document.getElementById('searchInput').value = '';
  updateStats();
  applyFilters();
}

function setSize(s) {
  const grid = document.getElementById('cardGrid');
  grid.classList.remove('size-s', 'size-m', 'size-l');
  grid.classList.add('size-' + s);
  document.querySelectorAll('.size-btn').forEach(b => b.classList.toggle('active', b.dataset.size === s));
  try { localStorage.setItem('gridSize', s); } catch(e) {}
}

const _initSize = (() => { try { return localStorage.getItem('gridSize') || 's'; } catch(e) { return 's'; } })();
updateStats();
applyFilters();
setSize(_initSize);
</script>
</body>
</html>
