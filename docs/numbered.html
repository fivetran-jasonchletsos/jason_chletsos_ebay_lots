:root {
  --bg:          #0a0a0a;
  --surface:     #141414;
  --surface-2:   #1a1a1a;
  --surface-3:   #232323;
  --border:      rgba(201,165,66,0.10);
  --border-mid:  rgba(201,165,66,0.22);
  --border-hi:   rgba(201,165,66,0.42);
  --gold:        #c9a542;
  --gold-bright: #e6c66a;
  --gold-dim:    #8a7521;
  --text:        #f1efe9;
  --text-muted:  #9a9388;
  --text-dim:    #7a7268;
  --success:     #7fc77a;
  --warning:     #e0b54a;
  --danger:      #e07b6f;
  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 16px;
  --fs-xs:  clamp(11px, 0.68rem + 0.1vw, 12.5px);
  --fs-sm:  clamp(12.5px, 0.78rem + 0.12vw, 14px);
  --fs-base: clamp(15px, 0.9rem + 0.2vw, 17px);
  --fs-lg:  clamp(17px, 1rem + 0.4vw, 20px);
  --fs-xl:  clamp(20px, 1.2rem + 0.6vw, 26px);
  --space-xs: 4px; --space-sm: 8px; --space-md: 16px; --space-lg: 24px; --space-xl: 40px;
}
*, *::before, *::after { box-sizing: border-box; }
html { color-scheme: dark; background: var(--bg); }
body {
  margin: 0; padding: 0;
  font-family: 'Familjen Grotesk', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* NAV */
nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,10,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 var(--space-lg);
  height: 52px;
  display: flex; align-items: center; justify-content: space-between;
}
.brand {
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
  font-size: var(--fs-lg);
  color: var(--gold);
  text-decoration: none;
  font-weight: 600;
}
.nav-links { display: flex; gap: var(--space-md); align-items: center; }
.nav-links a { font-size: var(--fs-sm); color: var(--text-muted); text-decoration: none; transition: color 160ms; }
.nav-links a:hover, .nav-links a.active { color: var(--text); }

/* MAIN */
main { max-width: 960px; margin: 0 auto; padding: var(--space-xl) var(--space-lg); }

.page-header { margin-bottom: var(--space-xl); }
.page-header h1 {
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
  font-size: var(--fs-xl);
  color: var(--gold-bright);
  margin: 0 0 var(--space-xs);
}
.page-header p { color: var(--text-muted); font-size: var(--fs-sm); margin: 0; }

/* STATS ROW */
.stats-row {
  display: flex; gap: var(--space-md); flex-wrap: wrap; margin-bottom: var(--space-xl);
}
.stat-pill {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: var(--space-sm) var(--space-md);
  display: flex; flex-direction: column; gap: 2px;
}
.stat-pill .val {
  font-family: 'JetBrains Mono', monospace;
  font-size: var(--fs-lg);
  color: var(--gold-bright);
  font-weight: 600;
}
.stat-pill .lbl { font-size: var(--fs-xs); color: var(--text-dim); }

/* FILTER BAR */
.filter-bar {
  display: flex; gap: var(--space-sm); flex-wrap: wrap; margin-bottom: var(--space-lg); align-items: center;
}
.filter-btn {
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border-mid);
  background: transparent;
  color: var(--text-muted);
  font-size: var(--fs-xs);
  font-family: 'Familjen Grotesk', sans-serif;
  cursor: pointer;
  transition: all 160ms;
}
.filter-btn:hover { border-color: var(--gold-dim); color: var(--text); }
.filter-btn.active { background: var(--gold); border-color: var(--gold); color: #0a0a0a; font-weight: 600; }

/* CARDS GRID */
.cards-grid {
  display: flex; flex-direction: column; gap: var(--space-sm);
}

/* TIER HEADER */
.tier-header {
  padding: var(--space-xs) var(--space-md);
  border-radius: var(--r-sm);
  font-size: var(--fs-xs);
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: var(--space-md);
  margin-bottom: var(--space-xs);
  display: flex; align-items: center; gap: var(--space-sm);
}

/* numbered card row */
.card-row {
  display: grid;
  grid-template-columns: 80px 1fr 80px 90px;
  align-items: center;
  gap: var(--space-md);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: var(--space-sm) var(--space-md);
  transition: border-color 160ms, background 160ms;
  text-decoration: none;
  color: var(--text);
}
.card-row:hover {
  border-color: var(--border-hi);
  background: var(--surface-2);
}

.serial-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: var(--fs-sm);
  font-weight: 700;
  text-align: center;
  padding: 4px 8px;
  border-radius: var(--r-sm);
  white-space: nowrap;
}

.card-title {
  font-size: var(--fs-sm);
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-price {
  font-family: 'JetBrains Mono', monospace;
  font-size: var(--fs-sm);
  color: var(--success);
  text-align: right;
  font-weight: 600;
}

.card-link-btn {
  font-size: var(--fs-xs);
  color: var(--gold);
  text-align: right;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* RARITY TIER COLORS */
.tier-legendary { color: #e6c66a; background: rgba(230,198,106,0.12); border-left: 3px solid #e6c66a; }
.badge-legendary { background: rgba(230,198,106,0.18); color: #e6c66a; border: 1px solid rgba(230,198,106,0.4); }
.row-legendary { border-left: 3px solid rgba(230,198,106,0.5); }

.tier-ultra { color: #c084fc; background: rgba(192,132,252,0.10); border-left: 3px solid #c084fc; }
.badge-ultra { background: rgba(192,132,252,0.15); color: #c084fc; border: 1px solid rgba(192,132,252,0.35); }
.row-ultra { border-left: 3px solid rgba(192,132,252,0.4); }

.tier-rare { color: #fb923c; background: rgba(251,146,60,0.10); border-left: 3px solid #fb923c; }
.badge-rare { background: rgba(251,146,60,0.15); color: #fb923c; border: 1px solid rgba(251,146,60,0.35); }
.row-rare { border-left: 3px solid rgba(251,146,60,0.4); }

.tier-uncommon { color: #60a5fa; background: rgba(96,165,250,0.10); border-left: 3px solid #60a5fa; }
.badge-uncommon { background: rgba(96,165,250,0.15); color: #60a5fa; border: 1px solid rgba(96,165,250,0.35); }
.row-uncommon { border-left: 3px solid rgba(96,165,250,0.4); }

.tier-semi { color: #4ade80; background: rgba(74,222,128,0.10); border-left: 3px solid #4ade80; }
.badge-semi { background: rgba(74,222,128,0.15); color: #4ade80; border: 1px solid rgba(74,222,128,0.35); }
.row-semi { border-left: 3px solid rgba(74,222,128,0.4); }

.tier-common { color: var(--text-dim); background: rgba(255,255,255,0.04); border-left: 3px solid var(--text-dim); }
.badge-common { background: rgba(255,255,255,0.08); color: var(--text-dim); border: 1px solid rgba(255,255,255,0.15); }
.row-common { border-left: 3px solid rgba(255,255,255,0.15); }

.tier-unconfirmed { color: var(--danger); background: rgba(224,123,111,0.10); border-left: 3px solid var(--danger); }
.badge-unconfirmed { background: rgba(224,123,111,0.15); color: var(--danger); border: 1px solid rgba(224,123,111,0.35); }
.row-unconfirmed { border-left: 3px solid rgba(224,123,111,0.4); }

/* ADMIN GATE */
.admin-gate {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: var(--space-lg);
  padding: var(--space-xl);
}
.admin-gate.hidden { display: none; }
.gate-logo { font-family: 'Fraunces', Georgia, serif; font-style: italic; font-size: 2.5rem; color: var(--gold); font-weight: 700; }
.gate-desc { font-size: var(--fs-sm); color: var(--text-muted); text-align: center; max-width: 320px; }

/* EMPTY STATE */
.empty { text-align: center; padding: var(--space-xl); color: var(--text-dim); font-size: var(--fs-sm); }

/* FOOTER */
footer {
  border-top: 1px solid var(--border);
  padding: var(--space-md) var(--space-lg);
  text-align: center;
  font-size: var(--fs-xs);
  color: var(--text-dim);
  margin-top: var(--space-xl);
}

@media (max-width: 600px) {
  .card-row { grid-template-columns: 70px 1fr 70px; }
  .card-link-btn { display: none; }
  main { padding: var(--space-lg) var(--space-md); }
}
  </style>
</head>

function tierOf(total) {
  if (total == null)  return 'unconfirmed';  // serial truncated by eBay 80-char title limit
  if (total <= 5)   return 'legendary';
  if (total <= 25)  return 'ultra';
  if (total <= 99)  return 'rare';
  if (total <= 249) return 'uncommon';
  if (total <= 499) return 'semi';
  return 'common';
}

const TIER_LABELS = {
  legendary:   'Legendary  /1 – /5',
  ultra:       'Ultra Rare  /6 – /25',
  rare:        'Rare  /26 – /99',
  uncommon:    'Uncommon  /100 – /249',
  semi:        'Semi-Rare  /250 – /499',
  common:      '/500+',
  unconfirmed: 'Print Run Unconfirmed (title truncated — verify on card)',
};

// escape listing-derived text before inserting into innerHTML
function esc(s) {
  return String(s).replace(/[&<>"']/g, c => (
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
}

// rarest first; unconfirmed print runs (total == null) always sort to the end
const sorted = [...LISTINGS].sort((a, b) => {
  const at = a.total == null ? Infinity : a.total;
  const bt = b.total == null ? Infinity : b.total;
  return at - bt || a.num - b.num;
});

// Stats ALWAYS reflect the full collection, never the active filter.
function renderStats() {
  const totalValue = sorted.reduce((s, l) => s + l.price, 0);
  const byTier = {};
  sorted.forEach(l => { const t = tierOf(l.total); byTier[t] = (byTier[t]||0) + 1; });
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-pill"><span class="val">${sorted.length}</span><span class="lbl">Numbered Listings</span></div>
    <div class="stat-pill"><span class="val">$${totalValue.toFixed(2)}</span><span class="lbl">Total Ask Value</span></div>
    <div class="stat-pill"><span class="val">${byTier.legendary||0}</span><span class="lbl">Legendary (/1–/5)</span></div>
    <div class="stat-pill"><span class="val">${byTier.ultra||0}</span><span class="lbl">Ultra Rare (/6–/25)</span></div>
    <div class="stat-pill"><span class="val">${byTier.rare||0}</span><span class="lbl">Rare (/26–/99)</span></div>
  `;
}

function renderGrid(tier) {
  renderStats();
  const data = tier === 'all' ? sorted : sorted.filter(l => tierOf(l.total) === tier);
  if (!data.length) {
    document.getElementById('cards-grid').innerHTML = '<div class="empty">No listings in this tier.</div>';
    return;
  }

  let html = '';
  let lastTier = null;
  data.forEach(l => {
    const t = tierOf(l.total);
    if (t !== lastTier && tier === 'all') {
      html += `<div class="tier-header tier-${t}">${TIER_LABELS[t]}</div>`;
      lastTier = t;
    }
    const titleShort = l.title.length > 72 ? l.title.slice(0, 71) + '…' : l.title;
    const badge  = l.total == null ? `#${l.num}` : `/${l.total}`;
    const serial = l.total == null ? `#${l.num}/? &rarr;` : `#${l.num}/${l.total} &rarr;`;
    html += `
    <a class="card-row row-${t}" href="${esc(l.url)}" target="_blank" rel="noopener">
      <span class="serial-badge badge-${t}">${badge}</span>
      <span class="card-title">${esc(titleShort)}</span>
      <span class="card-price">$${l.price.toFixed(2)}</span>
      <span class="card-link-btn">${serial}</span>
    </a>`;
  });
  document.getElementById('cards-grid').innerHTML = html;
}

// filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid(btn.dataset.tier);
  });
});

// ADMIN GATE — Google OAuth, matching seller.html
function handleGoogleSignIn(response) {
  try {
    const payload = JSON.parse(atob(response.credential.split('.')[1]));
    if (payload.email === window.__ADMIN_EMAIL) {
      localStorage.setItem('h2k_admin_email', payload.email);
      location.reload();
    } else {
      alert('Access denied: ' + payload.email);
    }
  } catch(e) { console.error(e); }
}

(function initAdminGate() {
  try {
    var stored = localStorage.getItem('h2k_admin_email');
    if (stored === window.__ADMIN_EMAIL) {
      document.documentElement.classList.add('pre-is-admin');
      document.body.classList.add('is-admin');
      document.getElementById('adminGate').classList.add('hidden');
    }
  } catch(e) {}
})();

// footer timestamp
document.getElementById('footer-ts').textContent =
  'Last updated: ' + new Date().toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});

renderGrid('all');
</script>
